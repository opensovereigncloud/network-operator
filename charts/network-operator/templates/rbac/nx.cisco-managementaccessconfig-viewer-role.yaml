{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "network-operator.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    name: {{ include "network-operator.resourceName" (dict "suffix" "nx" "context" $) }}.cisco-managementaccessconfig-viewer-role
rules:
    - apiGroups:
        - nx.cisco.networking.metal.ironcore.dev
      resources:
        - managementaccessconfigs
      verbs:
        - get
        - list
        - watch
{{- end }}
