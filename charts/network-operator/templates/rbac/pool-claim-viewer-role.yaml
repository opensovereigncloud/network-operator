{{- if .Values.rbac.helpers.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "network-operator.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "network-operator.resourceName" (dict "suffix" "pool-claim-viewer-role" "context" $) }}
rules:
- apiGroups:
  - pool.networking.metal.ironcore.dev
  resources:
  - claims
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - pool.networking.metal.ironcore.dev
  resources:
  - claims/status
  verbs:
  - get
{{- end }}
