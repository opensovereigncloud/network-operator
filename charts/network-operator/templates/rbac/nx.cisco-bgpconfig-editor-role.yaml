{{- if .Values.rbac.helpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "network-operator.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "network-operator.resourceName" (dict "suffix" "nx" "context" $) }}.cisco-bgpconfig-editor-role
rules:
- apiGroups:
  - nx.cisco.networking.metal.ironcore.dev
  resources:
  - bgpconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nx.cisco.networking.metal.ironcore.dev
  resources:
  - bgpconfigs/status
  verbs:
  - get
{{- end }}
