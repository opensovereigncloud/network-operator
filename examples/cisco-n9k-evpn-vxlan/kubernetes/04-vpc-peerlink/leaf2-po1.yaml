apiVersion: networking.metal.ironcore.dev/v1alpha1
kind: Interface
metadata:
  labels:
    networking.metal.ironcore.dev/role: vpc-peer-link
  name: leaf2-po1
spec:
  deviceRef:
    name: leaf2
  providerConfigRef:
    apiVersion: nx.cisco.networking.metal.ironcore.dev/v1alpha1
