version: "2"
run:
  timeout: 10m0s
  allow-parallel-runners: true
  modules-download-mode: readonly
issues:
  # '0' disables the following options
  max-issues-per-linter: 0
  max-same-issues: 0
linters:
  # Disable all pre-enabled linters and enable them explicitly so that a newer
  # version does not introduce new linters unexpectedly.
  default: none
  enable:
    # Checks for pass []any as any in variadic func(...any).
    - asasalint
    # Only use ASCII chars in identifiers.
    - asciicheck
    # Detects dangerous Unicode bidi characters that can obscure code intent.
    - bidichk
    # Checks whether HTTP response body is closed successfully.
    - bodyclose
    # Checks whether net/http.Header uses canonical header form.
    - canonicalheader
    # Detects struct fields that contain context.Context, which is discouraged.
    - containedctx
    # Checks that functions use a context inherited from the caller, not context.Background/TODO.
    - contextcheck
    # Too many blank identifiers on the left side of an assignment.
    - dogsled
    # Duplicate words in comments or code.
    - dupword
    # Checks for two durations being multiplied together (almost always a bug).
    - durationcheck
    # Reports unchecked errors (assignment to _ or missing return check).
    - errcheck
    # Finds invalid types passed to json encoder functions.
    - errchkjson
    # Checks that sentinel errors are prefixed with Err and error types end with Error.
    - errname
    # Finds code that will cause problems with the error wrapping scheme from Go 1.13.
    - errorlint
    # Checks for switch statements over enums that are missing cases.
    - exhaustive
    # Detects golang.org/x/exp usages that have been promoted to the standard library.
    - exptostd
    # Detects contexts that are created inside a loop body (fat context antipattern).
    - fatcontext
    # Prohibits specific function/pattern usage (ioutil, http.DefaultServeMux).
    - forbidigo
    # Lints Ginkgo and Gomega test code for common mistakes and antipatterns.
    - ginkgolinter
    # Validates //go: compiler directive comments.
    - gocheckcompilerdirectives
    # Suggests extracting repeated string/numeric literals as named constants.
    - goconst
    # Provides diagnostics for bugs, performance, and style via configurable checks.
    - gocritic
    # Computes cyclomatic complexity; flags overly complex functions.
    - gocyclo
    # Inspects source code for security problems.
    - gosec
    # Basically go vet — catches a broad range of correctness issues.
    - govet
    # Detects ineffectual assignments that are immediately overwritten.
    - ineffassign
    # Interfaces with too many methods.
    - interfacebloat
    # Checks for integer range loops that could be simplified with range-over-int.
    - intrange
    # Detects iota const blocks that mix iota-generated and explicit values.
    - iotamixing
    # Checks Go logging calls for Kubernetes structured logging conventions (klog/logr).
    - logcheck
    # Checks key-value pairs in logr/klog/zap structured logging calls.
    - loggercheck
    # Finds slice declarations with non-zero initial length where append is used.
    - makezero
    # Reports bytes/strings mirror patterns that use the wrong package.
    - mirror
    # Finds commonly misspelled English words in comments and strings.
    - misspell
    # Modernises Go code to use newer language and standard library features.
    - modernize
    # Checks that struct fields passed to encoding functions have the required tags.
    - musttag
    # Detects naked returns (named return parameters with a bare return statement).
    - nakedret
    # Finds the code that returns nil even if it checks that the error is not nil.
    - nilerr
    # Finds non-nil interfaces wrapping nil pointers (the Go interface nil trap).
    - nilnesserr
    # Reports functions that simultaneously return nil error and nil value, hiding intent.
    - nilnil
    # Finds HTTP requests created without context.Context.
    - noctx
    # Checks for misuse of nolint directives (missing linter name or reason).
    - nolintlint
    # Checks for misuse of Sprintf to construct a host:port URL.
    - nosprintfhostport
    # Checks that fmt.Sprintf can be replaced with a faster alternative.
    - perfsprint
    # Finds slice declarations that could be pre-allocated to avoid growth.
    - prealloc
    # Finds predeclared identifiers that are shadowed in the current scope.
    - predeclared
    # Reports direct reads from proto message fields when getters should be used.
    - protogetter
    # Checks that package variables are not reassigned after initialisation.
    - reassign
    # Fast, configurable, extensible linter for Go; drop-in replacement for golint.
    - revive
    # A large set of correctness, simplification, and style checks.
    - staticcheck
    # Checks for unnecessary type conversions that can be removed.
    - unconvert
    # Reports unused function parameters or results.
    - unparam
    # Detects unused constants, variables, functions, and types.
    - unused
    # Reports that standard library variables/constants should be used where possible.
    - usestdlibvars
    # Reports test helpers that should use t.Helper() and related replacements.
    - usetesting
    # Finds assignments where the assigned value is never subsequently read.
    - wastedassign
    # Checks for unnecessary newlines at the start and end of functions and blocks.
    - whitespace
  settings:
    custom:
      logcheck:
        type: "module"
        description: Checks Go logging calls for Kubernetes logging conventions.
    errcheck:
      # Report about assignment of errors to blank identifier.
      check-blank: true
      # Do not report about not checking of errors in type assertions.
      check-type-assertions: false
    exhaustive:
      # Presence of "default" case in switch statements satisfies exhaustiveness,
      # even if all enum members are not listed.
      default-signifies-exhaustive: true
    forbidigo:
      # Match patterns against types, not just identifiers
      analyze-types: true
      forbid:
        # The ioutil package has been deprecated in https://github.com/golang/go/issues/42026
        - pattern: ^ioutil\..*$
        # Using http.DefaultServeMux is discouraged because it's a global variable that
        # some packages silently add handlers to (e.g. net/http/pprof). Use http.NewServeMux().
        - pattern: ^http\.DefaultServeMux$
        - pattern: ^http\.Handle(?:Func)?$
    goconst:
      min-occurrences: 5
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - performance
      disabled-tags:
        - style
        - opinionated
      disabled-checks:
        - evalOrder    # false positives in complex expressions
        - rangeValCopy # controller loops often range over large structs
        - hugeParam    # k8s apimachinery types are typically passed by value
    gosec:
      excludes:
        # gosec wants us to set a short ReadHeaderTimeout to avoid Slowloris attacks,
        # but doing so would expose us to Keep-Alive race conditions.
        # See: https://iximiuz.com/en/posts/reverse-proxy-http-keep-alive-and-502s/
        - G112
        # Created file permissions are restricted by umask if necessary.
        - G306
    govet:
      disable:
        - fieldalignment
      enable-all: true
    modernize:
      disable:
        # omitzero requires removing omitempty tags in kubernetes API struct types which
        # are interpreted by controller-gen and would break the CRDs.
        - omitzero
    nolintlint:
      require-specific: true
    perfsprint:
      # modernize generates nicer fix code for loop concatenation
      concat-loop: false
    revive:
      # Enable only the rules listed below; disable revive's built-in defaults.
      # Rule set based on the recommended configuration.
      # See: https://github.com/mgechev/revive#recommended-configuration
      enable-default-rules: false
      rules:
        - name: blank-imports
        - name: bool-literal-in-expr
        - name: constant-logical-expr
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: var-declaration
        - name: var-naming
    staticcheck:
      dot-import-whitelist:
        - github.com/onsi/ginkgo/v2
        - github.com/onsi/gomega
    usestdlibvars:
      time-date-month: true
      time-month: true
      time-layout: true
      crypto-hash: true
      default-rpc-path: true
      tls-signature-scheme: true
      constant-kind: true
    usetesting:
      os-temp-dir: true
      context-background: true
      context-todo: true
  exclusions:
    generated: lax
    presets:
      - legacy
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - linters:
          - fatcontext
          - goconst
          - gocyclo
        path: (.+)_test\.go
      # It is idiomatic Go to reuse the name 'err' with ':=' for subsequent errors.
      # Ref: https://go.dev/doc/effective_go#redeclaration
      - path: (.+)\.go$
        text: declaration of "err" shadows declaration at
      # In test code, proto fields are accessed directly for assertions on
      # captured request structs — getters add no safety here.
      - linters:
          - protogetter
        path: (.+)_test\.go
      # Ginkgo and Gomega are designed to be dot-imported; this is idiomatic
      # and consistent with the kubebuilder project template.
      - linters:
          - revive
        text: "dot-imports"
        path: (.+)_test\.go
      # DeepCopyInto/DeepCopy methods use the controller-gen convention of
      # 'in'/'out' receivers regardless of the type's primary receiver name.
      - linters:
          - revive
        text: "receiver-naming"
        source: "func \\((in|out) \\*"
    paths:
      - builtin$
      - examples$
      - third_party$
      - internal/provider/openconfig
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ironcore-dev/network-operator
  exclusions:
    generated: lax
    paths:
      - builtin$
      - examples$
      - third_party$
      - internal/provider/openconfig
